# =============================================================================
# Hezalli — production stack (VPS)
#
#   db      → PostgreSQL 16 (data persisted in a named volume)
#   migrate → runs `prisma migrate deploy` once, then exits
#   app     → Next.js server (standalone), started after migrations succeed
#   caddy   → reverse proxy with AUTOMATIC HTTPS (Let's Encrypt) for the domain
#
# Configuration comes from a `.env` file next to this file (see
# `.env.production.example`). Bring the stack up with:
#
#   docker compose up -d --build
# =============================================================================

services:
  db:
    image: postgres:16
    container_name: hezalli-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hezalli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hezalli}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-hezalli} -d ${POSTGRES_DB:-hezalli}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    container_name: hezalli-migrate
    build:
      context: .
      target: builder
    # Migrations are a HARD gate — the app must not start against an un-migrated
    # schema, so `prisma migrate deploy` failing aborts the container (and blocks
    # `app` via depends_on). Seeding, however, is best-effort: an empty-DB seed or
    # a category top-up throwing must NOT keep the whole site offline. We isolate
    # each seed step with `|| ...` so a seed failure is logged but still exits 0.
    command: >
      sh -c "npx prisma migrate deploy
      && { npx tsx prisma/seed-if-empty.ts || echo 'WARN: seed-if-empty failed (non-fatal), continuing'; }
      && { npx tsx prisma/ensure-categories.ts || echo 'WARN: ensure-categories failed (non-fatal), continuing'; }"
    environment:
      # Production runtime: makes the destructive demo seed refuse (see
      # prisma/seed-if-empty.ts and prisma/seed.ts) so a first deploy never
      # provisions the shared-password demo/admin accounts.
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    container_name: hezalli-app
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://www.hezalli.com}
      # Passwordless test-account login (/dev-login + login-screen chips).
      # Off unless set to "true" in .env. NEVER set it on a real production host.
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-}
      # Web Push (driver notifications). No-ops unless both keys are set.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@hezalli.com}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  caddy:
    image: caddy:2
    container_name: hezalli-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Domain(s) and contact email used by Caddy for automatic TLS.
      SITE_ADDRESS: ${SITE_ADDRESS:-hezalli.com, www.hezalli.com}
      ACME_EMAIL: ${ACME_EMAIL:-admin@hezalli.com}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
