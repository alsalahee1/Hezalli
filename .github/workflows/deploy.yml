name: Deploy

# Deploys Hezalli to the VPS over SSH whenever the deploy branch is pushed,
# or when triggered manually from the Actions tab.
#
# Requires these repository secrets (Settings → Secrets and variables →
# Actions):
#   VPS_HOST        public IP or hostname of the server
#   VPS_USER        SSH user (e.g. root or a sudo user)
#   VPS_SSH_KEY     the PRIVATE SSH key that can log into the server
#   VPS_PORT        (optional) SSH port, defaults to 22
#   VPS_APP_DIR     (optional) path to the repo on the server,
#                   defaults to /opt/hezalli

on:
  push:
    branches:
      - claude/deploy-hezalli-domain-j13af5
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/hezalli' }}"
            BRANCH="claude/deploy-hezalli-domain-j13af5"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "First deploy — cloning into $APP_DIR"
              git clone --branch "$BRANCH" \
                https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
              bash deploy/bootstrap.sh
            else
              cd "$APP_DIR"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              git reset --hard "origin/$BRANCH"
              docker compose up -d --build
              docker compose ps
            fi
