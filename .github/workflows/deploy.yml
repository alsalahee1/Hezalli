name: Deploy

# Deploys Hezalli to the VPS over SSH whenever the deploy branch is pushed,
# or when triggered manually from the Actions tab.
#
# Requires these repository secrets (Settings → Secrets and variables →
# Actions):
#   VPS_HOST        public IP or hostname of the server
#   VPS_USER        SSH user (e.g. root or a sudo user)
#   VPS_PASSWORD    the server's root/user password (Hostinger default auth)
#   VPS_SSH_KEY     (optional) private key, used if VPS_PASSWORD is not set
#   VPS_PORT        (optional) SSH port, defaults to 22
#   VPS_APP_DIR     (optional) path to the repo on the server,
#                   defaults to /opt/hezalli
#
# Deploys on push to the deploy branch. The deploy script (deploy/vps-deploy.sh)
# is n8n-safe: it detects the existing Traefik proxy and routes Hezalli through
# it instead of taking over ports 80/443.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR || '/opt/hezalli' }}"
            BRANCH="main"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "First deploy — cloning into $APP_DIR"
              git clone --branch "$BRANCH" \
                https://github.com/${{ github.repository }}.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin "$BRANCH"
              git checkout "$BRANCH"
              git reset --hard "origin/$BRANCH"
            fi
            cd "$APP_DIR"
            # Smart deploy: detects Traefik/n8n and coexists safely.
            bash deploy/vps-deploy.sh
