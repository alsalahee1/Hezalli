name: Delete branches

# Admin utility: delete a list of remote branches without a computer.
# Run it from the Actions tab (or API) with a space-separated branch list.
# The default branch and `main` are always refused.

on:
  workflow_dispatch:
    inputs:
      branches:
        description: "Space-separated branch names to delete"
        required: true
        type: string

permissions:
  contents: write

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete listed branches
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCHES: ${{ inputs.branches }}
          DEFAULT: ${{ github.event.repository.default_branch }}
        run: |
          status=0
          for b in $BRANCHES; do
            if [ "$b" = "$DEFAULT" ] || [ "$b" = "main" ]; then
              echo "::warning::refusing to delete protected branch: $b"
              continue
            fi
            if gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${b}"; then
              echo "deleted: $b"
            else
              echo "::error::failed to delete: $b"
              status=1
            fi
          done
          exit $status
