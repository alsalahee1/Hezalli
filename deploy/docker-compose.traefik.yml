# =============================================================================
# Hezalli — deployment that COEXISTS with the existing Traefik reverse proxy
# (Hostinger n8n template). Traefik already owns ports 80/443; this stack does
# NOT publish those ports. Instead the app joins Traefik's network and is
# routed by labels, so n8n keeps working untouched and Hezalli gets automatic
# HTTPS from the same Traefik/Let's Encrypt setup.
#
# The values in ${...} are auto-detected and written to .env by
# deploy/vps-deploy.sh:
#   TRAEFIK_NETWORK      external docker network Traefik watches
#   TRAEFIK_ENTRYPOINT   Traefik entrypoint bound to :443 (usually websecure)
#   TRAEFIK_CERTRESOLVER Traefik ACME cert resolver name
#
# Start with:
#   docker compose -f deploy/docker-compose.traefik.yml --env-file .env up -d --build
# =============================================================================

services:
  db:
    image: postgres:16
    container_name: hezalli-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hezalli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hezalli}
    volumes:
      - hezalli-db-data:/var/lib/postgresql/data
    networks:
      - hezalli-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-hezalli} -d ${POSTGRES_DB:-hezalli}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    container_name: hezalli-migrate
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    # Migrations are a HARD gate — the app must not start against an un-migrated
    # schema, so `prisma migrate deploy` failing aborts the container (and blocks
    # `app` via depends_on). Seeding, however, is best-effort: an empty-DB seed or
    # a category top-up throwing must NOT keep the whole site offline. We isolate
    # each seed step with `|| ...` so a seed failure is logged but still exits 0.
    command: >
      sh -c "npx prisma migrate deploy
      && { npx tsx prisma/seed-if-empty.ts || echo 'WARN: seed-if-empty failed (non-fatal), continuing'; }
      && { npx tsx prisma/ensure-categories.ts || echo 'WARN: ensure-categories failed (non-fatal), continuing'; }
      && { if [ \"$$DEV_LOGIN_ENABLED\" = 'true' ]; then npx tsx prisma/ensure-demo-logins.ts || echo 'WARN: ensure-demo-logins failed (non-fatal), continuing'; else echo 'demo logins skipped (DEV_LOGIN_ENABLED unset)'; fi; }"
    environment:
      # Production runtime: makes the destructive demo seed refuse (see
      # prisma/seed-if-empty.ts and prisma/seed.ts) so a first deploy never
      # provisions the shared-password demo/admin accounts. The demo logins
      # below are added only when DEV_LOGIN_ENABLED=true (test hosts).
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      # Test-mode only: keeps the one-tap demo accounts (driver, point, wallet
      # manager, delivery manager) present on servers that use /dev-login.
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-}
    networks:
      - hezalli-internal
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    container_name: hezalli-app
    build:
      context: ..
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://www.hezalli.com}
      # One-tap demo login on the sign-in page. Off unless set to "true" in
      # .env. NEVER enable on a real production site — it lets anyone sign in
      # as a seed account (admin included) with one tap.
      DEV_LOGIN_ENABLED: ${DEV_LOGIN_ENABLED:-}
      # Shared secret for the /api/cron/* endpoints; the cron sidecar below
      # sends it as a bearer token. Generated into .env by vps-deploy.sh.
      CRON_SECRET: ${CRON_SECRET:-}
      PORT: "3000"
    networks:
      - hezalli-internal
      - traefik
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      # HTTPS router for the apex + www hostnames.
      - "traefik.http.routers.hezalli.rule=Host(`hezalli.com`) || Host(`www.hezalli.com`)"
      - "traefik.http.routers.hezalli.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.routers.hezalli.tls=true"
      - "traefik.http.routers.hezalli.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.services.hezalli.loadbalancer.server.port=3000"
      # Plain-HTTP router that redirects to HTTPS.
      - "traefik.http.routers.hezalli-http.rule=Host(`hezalli.com`) || Host(`www.hezalli.com`)"
      - "traefik.http.routers.hezalli-http.entrypoints=${TRAEFIK_ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.hezalli-http.middlewares=hezalli-redirect"
      - "traefik.http.middlewares.hezalli-redirect.redirectscheme.scheme=https"

  # Scheduler sidecar: replaces Vercel Cron on the VPS. Once an hour it calls
  # every /api/cron/* endpoint with the shared secret. All endpoints are
  # idempotent (one-shot guards), so the fixed hourly cadence is safe; a
  # failing call is logged and retried next hour.
  cron:
    container_name: hezalli-cron
    image: curlimages/curl:8.10.1
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET:-}
    command: >
      sh -c "while true; do
      for job in auto-complete shipments points marketing; do
      curl -fsS -m 60 -H \"Authorization: Bearer $$CRON_SECRET\"
      \"http://app:3000/api/cron/$$job\"
      && echo \" cron $$job ok\"
      || echo \"cron $$job failed\";
      done;
      sleep 3600;
      done"
    networks:
      - hezalli-internal
    depends_on:
      app:
        condition: service_started

networks:
  hezalli-internal:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}

volumes:
  hezalli-db-data:
